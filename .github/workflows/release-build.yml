name: Build and attach release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lazarus
        shell: powershell
        run: |
          choco install lazarus --no-progress -y
          $lazbuild = Get-ChildItem -Path "C:\lazarus" -Recurse -Filter lazbuild.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lazbuild) {
            Write-Error "lazbuild.exe not found after Lazarus installation"
            exit 1
          }
          echo "LAZBUILD=$($lazbuild.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Add FPC to PATH
        shell: powershell
        run: |
          $fpcBin = "C:\lazarus\fpc\3.2.2\bin\x86_64-win64"
          if (Test-Path $fpcBin) {
            $fpcBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Added FPC to PATH: $fpcBin"
          } else {
            Write-Warning "FPC bin path not found: $fpcBin"
          }

      - name: Build main Cheat Engine project (required, win64)
        shell: powershell
        run: |
          $mainProject = "Cheat Engine/cheatengine.lpi"
          if (-not (Test-Path $mainProject)) {
            Write-Error "Main project not found: $mainProject"
            exit 1
          }

          $pcp = Join-Path $env:RUNNER_TEMP "lazarus"
          New-Item -ItemType Directory -Force -Path $pcp | Out-Null

          Write-Host "Building required project (win64): $mainProject"
          & "$env:LAZBUILD" `
            --cpu=x86_64 --os=win64 `
            --lazarusdir="C:\lazarus" `
            --pcp="$pcp" `
            --build-mode="Release 32-Bit" `
            --add-package "C:\lazarus\components\lazutils\lazutils.lpk" `
            --add-package "C:\lazarus\packager\registration\fcl.lpk" `
            $mainProject --build-all

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Main project build failed: $mainProject"
            exit $LASTEXITCODE
          }

      - name: Build optional projects (non-blocking, win64)
        shell: powershell
        run: |
          $optionalProjects = @(
            "Cheat Engine/cecore.lpi"
          )

          $pcp = Join-Path $env:RUNNER_TEMP "lazarus"
          New-Item -ItemType Directory -Force -Path $pcp | Out-Null

          foreach ($proj in $optionalProjects) {
            if (-not (Test-Path $proj)) {
              Write-Warning "Optional project not found, skipping: $proj"
              continue
            }

            Write-Host "Building optional project (win64): $proj"
            & "$env:LAZBUILD" `
              --cpu=x86_64 --os=win64 `
              --lazarusdir="C:\lazarus" `
              --pcp="$pcp" `
              --add-package "C:\lazarus\components\lazutils\lazutils.lpk" `
              --add-package "C:\lazarus\packager\registration\fcl.lpk" `
              $proj --build-all

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Optional project failed (ignored): $proj (exit code: $LASTEXITCODE)"
            }
          }

      - name: Validate build output
        shell: powershell
        run: |
          $binPath = "Cheat Engine\bin"
          if (-not (Test-Path $binPath)) {
            Write-Error "Build output folder not found: $binPath"
            exit 1
          }

          $files = Get-ChildItem -Path $binPath -Recurse -File -ErrorAction SilentlyContinue
          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Build output folder is empty: $binPath"
            exit 1
          }

          Write-Host "Build output check passed: $($files.Count) files found."

      - name: Archive build output
        shell: powershell
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $zip = "CheatEngine-$tag-windows.zip"
          Compress-Archive -Path "Cheat Engine\bin\*" -DestinationPath $zip
          echo "ASSET_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
